<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>영수증 톡 - 관리자 검수</title>
<style>
  body { font-family: -apple-system, "Malgun Gothic", sans-serif; background: #f5f6fa; margin: 0; padding: 24px; }
  h1 { font-size: 20px; }
  .toolbar { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  input[type=password] { padding: 8px; border: 1px solid #ccc; border-radius: 8px; }
  button { padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .btn-load { background: #3730a3; color: white; }
  .btn-approve { background: #16a34a; color: white; }
  .btn-reject { background: #dc2626; color: white; }
  #stats { margin-bottom: 16px; font-size: 14px; color: #444; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
  th, td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 13px; text-align: left; vertical-align: top; }
  th { background: #f0f0fa; }
  img.thumb { width: 60px; border-radius: 6px; cursor: pointer; }
  .actions { display: flex; gap: 6px; }
</style>
</head>
<body>
  <h1>🧾 영수증 톡 — 관리자 검수</h1>
  <div class="toolbar">
    <input type="password" id="adminKey" placeholder="ADMIN_KEY 입력" />
    <button class="btn-load" onclick="loadData()">불러오기</button>
  </div>
  <div id="stats"></div>
  <table>
    <thead>
      <tr><th>사진</th><th>가맹점</th><th>금액</th><th>분류</th><th>구분</th><th>메모</th><th>확신도</th><th>작업</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

<script>
  function key() { return document.getElementById("adminKey").value; }

  async function loadData() {
    const k = key();
    if (!k) return alert("ADMIN_KEY를 입력해주세요.");
    localStorage.setItem("rt_admin_key", k);

    const statsRes = await fetch(`/api/admin/stats?key=${encodeURIComponent(k)}`);
    const stats = await statsRes.json();
    document.getElementById("stats").textContent =
      `전체 ${stats.total}건 · 검수대기 ${stats.pending}건 · 승인 ${stats.approved}건 · 반려 ${stats.rejected}건`;

    const res = await fetch(`/api/admin/receipts?status=pending_review&key=${encodeURIComponent(k)}`);
    const rows = await res.json();
    const tbody = document.getElementById("rows");
    tbody.innerHTML = "";
    rows.forEach((r) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><img class="thumb" src="/data-image?path=${encodeURIComponent(r.image_path)}&key=${encodeURIComponent(k)}" onerror="this.style.display='none'"/></td>
        <td>${r.merchant || "-"}</td>
        <td>${(r.amount || 0).toLocaleString()}원</td>
        <td>${r.category || "-"}</td>
        <td>${r.purpose_type || "-"}</td>
        <td>${r.context_note || ""}</td>
        <td>${r.confidence != null ? Math.round(r.confidence * 100) + "%" : "-"}</td>
        <td class="actions">
          <button class="btn-approve" onclick="approve('${r.id}')">승인</button>
          <button class="btn-reject" onclick="reject('${r.id}')">반려</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  async function approve(id) {
    await fetch(`/api/admin/receipts/${id}/approve?key=${encodeURIComponent(key())}`, { method: "POST" });
    loadData();
  }
  async function reject(id) {
    await fetch(`/api/admin/receipts/${id}/reject?key=${encodeURIComponent(key())}`, { method: "POST" });
    loadData();
  }

  window.onload = () => {
    const saved = localStorage.getItem("rt_admin_key");
    if (saved) { document.getElementById("adminKey").value = saved; loadData(); }
  };
</script>
</body>
</html>
